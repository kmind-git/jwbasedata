# ============================================================
# jwbasedata 外部配置文件
# ============================================================
# 部署时将此文件放置于 config/ 目录下
# 启动时会自动加载，优先级高于 JAR 内置配置
# ============================================================

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: jwbasedata

  # 数据库配置 (必须修改)
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jwbasedata}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 30000
      pool-name: JwBaseDataHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.jw.jwbasedata.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Swagger 配置 (生产环境建议关闭)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 日志级别配置
logging:
  level:
    root: INFO
    com.jw.jwbasedata: DEBUG
  file:
    path: ./logs
  log4j2:
    config-file: classpath:log4j2-spring.xml

# 基础配置 (打包内置，生产环境通过外部配置覆盖)
server:
  port: 8080

spring:
  application:
    name: jwbasedata

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.jw.jwbasedata.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
